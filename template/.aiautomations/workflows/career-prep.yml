# Workflow: Career Preparation
# Complete career preparation pipeline

name: career-prep
description: Full career preparation - resume, interview prep, and negotiation coaching

steps:
  - agent: career
    task: "Assess career goals and identify target roles"
    output: career_plan

  - agent: resume
    task: "Build or optimize resume for target roles"
    input: career_plan
    output: resume_draft

  - agent: interview
    task: "Conduct mock interviews for the target role"
    input: career_plan
    output: interview_feedback

  - agent: negotiation
    task: "Prepare salary negotiation strategy"
    input: career_plan
    output: negotiation_plan
