# Workflow: Research and Write
# A multi-agent pipeline for content creation

name: research-and-write
description: Research a topic thoroughly, then write polished content

steps:
  - agent: research
    task: "Research the given topic in depth, gathering key facts, statistics, and insights"
    output: research_notes

  - agent: writer
    task: "Write a well-structured article based on the research notes"
    input: research_notes
    output: draft

  - agent: reviewer
    task: "Review the draft for accuracy, clarity, and engagement"
    input: draft
    output: final
